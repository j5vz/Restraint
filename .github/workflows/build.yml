name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup
        run: |
          npm install
          npm install @capacitor/core @capacitor/android @capacitor/cli
          mkdir -p www
          cp index.html style.css start.lua www/ 2>/dev/null || true

      - name: init capacitor
        run: |
          npx cap add android || true
          npx cap sync || true

      - name: inject bridge
        run: |
          # force create the path if it's missing
          mkdir -p android/app/src/main/java/com/j5vz/restraint/
          cat <<EOF > android/app/src/main/java/com/j5vz/restraint/MainActivity.java
          package com.j5vz.restraint;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.JavascriptInterface;
          import android.content.Intent;
          import android.net.Uri;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = this.getBridge().getWebView();
                  webView.addJavascriptInterface(new Object() {
                      @JavascriptInterface
                      public void launch(String script) {
                          Intent i = new Intent(Intent.ACTION_VIEW);
                          i.setData(Uri.parse("robloxmobile://?launchTicket=1&script=" + script));
                          i.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                          startActivity(i);
                      }
                  }, "RestraintBridge");
              }
          }
          EOF

      - name: build apk
        run: |
          cd android
          # if gradlew is still missing, something is majorly wrong with the cap init
          if [ ! -f "gradlew" ]; then
            echo "GRADLEW MISSING - PRINTING DIR STRUCTURE"
            ls -R ..
            exit 1
          fi
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: Restraint-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
