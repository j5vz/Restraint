name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup
        run: |
          npm install
          npm install @capacitor/core @capacitor/android @capacitor/cli cordova-res
          mkdir -p www
          cp index.html style.css start.lua www/ 2>/dev/null || true

      - name: init capacitor
        run: |
          npx cap add android || true
          npx cap sync

      - name: inject bridge
        run: |
          # making sure the folder exists first
          mkdir -p android/app/src/main/java/com/j5vz/restraint/
          
          # writing the custom MainActivity directly to the source
          cat <<EOF > android/app/src/main/java/com/j5vz/restraint/MainActivity.java
          package com.j5vz.restraint;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.JavascriptInterface;
          import android.content.Intent;
          import android.net.Uri;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = this.getBridge().getWebView();
                  webView.addJavascriptInterface(new Object() {
                      @JavascriptInterface
                      public void launch(String script) {
                          Intent i = new Intent(Intent.ACTION_VIEW);
                          i.setData(Uri.parse("robloxmobile://?launchTicket=1&script=" + script));
                          i.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                          startActivity(i);
                      }
                  }, "RestraintBridge");
              }
          }
          EOF

      - name: preserve resources
        run: |
          # this keeps your icons and splash if they exist in the resources folder
          if [ -d "resources" ]; then
            npx cordova-res android --skip-config --copy
          fi
          # prevents android from using the default adaptive icon that ignores yours
          rm -rf android/app/src/main/res/mipmap-anydpi-v26 2>/dev/null || true

      - name: build apk
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: Restraint-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
