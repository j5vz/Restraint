name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: setup environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: install dependencies
        run: |
          npm install @capacitor/core @capacitor/android @capacitor/cli
          mkdir -p www
          cp index.html start.lua www/ 2>/dev/null || true

      - name: initialize capacitor
        run: |
          npx cap add android
          npx cap sync android

      - name: patch mainactivity (Disk Execution Bypass)
        run: |
          FILE_PATH=$(find android/app/src/main/java -name "MainActivity.java")
          PACKAGE_LINE=$(grep "package" $FILE_PATH)
          
          cat <<EOF > $FILE_PATH
          $PACKAGE_LINE
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.JavascriptInterface;
          import android.content.Intent;
          import android.net.Uri;
          import com.getcapacitor.BridgeActivity;
          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.InputStream;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  WebView webView = this.getBridge().getWebView();
                  webView.addJavascriptInterface(new Object() {
                      @JavascriptInterface
                      public void launch(String fileName) {
                          try {
                              // Copy start.lua from assets to a place the Roblox client can read
                              File outFile = new File(getCacheDir(), "start.lua");
                              InputStream is = getAssets().open("public/" + fileName);
                              FileOutputStream fos = new FileOutputStream(outFile);
                              byte[] buffer = new byte[1024];
                              int read;
                              while ((read = is.read(buffer)) != -1) {
                                  fos.write(buffer, 0, read);
                              }
                              fos.close();
                              is.close();
                              
                              // Create the Intent
                              Intent i = new Intent(Intent.ACTION_VIEW);
                              
                              // Use the file:// protocol. Some 2016 clients bypass login for local files.
                              String fileUri = "file://" + outFile.getAbsolutePath();
                              
                              // We use 'script' instead of 'scripturl' for some patched versions
                              String uri = "robloxmobile://+launchmode:play+gameinfo:GUEST+launchticket:GUEST+placeid:0+userId:0+username:Player+script:" + fileUri;
                              
                              i.setData(Uri.parse(uri));
                              i.setPackage("com.roblox.client"); 
                              i.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                              startActivity(i);
                              
                          } catch (Exception e) {
                              // Fallback
                              Intent i = new Intent(Intent.ACTION_VIEW);
                              i.setData(Uri.parse("robloxmobile://+launchmode:play+gameinfo:GUEST+scripturl:http://127.0.0.1:8080/start.lua"));
                              i.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                              startActivity(i);
                          }
                      }
                  }, "RestraintBridge");
              }
          }
          EOF

      - name: force custom icons
        run: |
          if [ -d "resources" ]; then
            find android/app/src/main/res/ -name "ic_launcher.png" -exec cp resources/icon.png {} \;
            find android/app/src/main/res/ -name "ic_launcher_round.png" -exec cp resources/icon.png {} \;
            rm -rf android/app/src/main/res/mipmap-anydpi-v26 2>/dev/null || true
          fi

      - name: build apk
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Restraint-BETA
          path: android/app/build/outputs/apk/debug/app-debug.apk
