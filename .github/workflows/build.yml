name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup
        run: |
          npm install
          npm install @capacitor/core @capacitor/android @capacitor/cli cordova-res
          mkdir -p www
          cp index.html style.css start.lua www/ 2>/dev/null || true

      - name: init
        run: |
          rm -rf android
          npx cap add android
          npx cap sync

      - name: bridge
        run: |
          mkdir -p android/app/src/main/java/com/j5vz/restraint/
          cat <<EOF > android/app/src/main/java/com/j5vz/restraint/MainActivity.java
          package com.j5vz.restraint;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.JavascriptInterface;
          import android.content.Intent;
          import android.net.Uri;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = this.getBridge().getWebView();
                  webView.addJavascriptInterface(new Object() {
                      @JavascriptInterface
                      public void launch(String script) {
                          Intent i = new Intent(Intent.ACTION_VIEW);
                          i.setData(Uri.parse("robloxmobile://?launchTicket=1&script=" + script));
                          i.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                          startActivity(i);
                      }
                  }, "RestraintBridge");
              }
          }
          EOF

      - name: assets
        run: |
          sudo apt-get install -y imagemagick
          mkdir -p resources
          if [ ! -f resources/icon.png ]; then convert -size 1024x1024 xc:white resources/icon.png; fi
          if [ ! -f resources/splash.png ]; then convert -size 2732x2732 xc:white resources/splash.png; fi
          npx cordova-res android --skip-config --copy
          rm -rf android/app/src/main/res/mipmap-anydpi-v26

      - name: build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: Restraint-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
