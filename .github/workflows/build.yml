name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: setup environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: install dependencies
        run: |
          npm install @capacitor/core @capacitor/android @capacitor/cli
          mkdir -p www
          cp index.html start.lua www/ 2>/dev/null || true

      - name: initialize capacitor
        run: |
          npx cap add android
          npx cap sync android

      - name: patch mainactivity (Direct Script Bypass)
        run: |
          FILE_PATH=$(find android/app/src/main/java -name "MainActivity.java")
          PACKAGE_LINE=$(grep "package" $FILE_PATH)
          
          cat <<EOF > $FILE_PATH
          $PACKAGE_LINE
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.JavascriptInterface;
          import android.content.Intent;
          import android.net.Uri;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  WebView webView = this.getBridge().getWebView();
                  webView.addJavascriptInterface(new Object() {
                      @JavascriptInterface
                      public void launch(String fileName) {
                          Intent i = new Intent(Intent.ACTION_VIEW);
                          
                          // Use 127.0.0.1 (Internal IP) to point to the file in your www folder
                          String localUrl = "http://127.0.0.1:8080/" + fileName;
                          
                          // THE BYPASS STRATEGY:
                          // Instead of placeLauncherUrl (which triggers login), we use the direct "Visit" protocol
                          // We pass the local URL as the script target. 
                          // Realxtr and late 2016 clients often respond to the 'join' ticket via '+' separators.
                          String uri = "robloxmobile://+launchmode:play+gameinfo:GUEST+launchticket:GUEST+placeid:0+userId:0+username:Player+scripturl:" + localUrl;
                          
                          i.setData(Uri.parse(uri));
                          i.setPackage("com.roblox.client"); 
                          i.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                          
                          try {
                              startActivity(i);
                          } catch (Exception e) {
                              // If Realxtr uses a custom package name, this allows you to pick it from the list
                              i.setPackage(null);
                              startActivity(i);
                          }
                      }
                  }, "RestraintBridge");
              }
          }
          EOF

      - name: inject icons
        run: |
          if [ -d "resources" ]; then
            find android/app/src/main/res/ -name "ic_launcher.png" -exec cp resources/icon.png {} \;
            find android/app/src/main/res/ -name "ic_launcher_round.png" -exec cp resources/icon.png {} \;
            rm -rf android/app/src/main/res/mipmap-anydpi-v26 2>/dev/null || true
          fi

      - name: build apk
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Restraint-BETA
          path: android/app/build/outputs/apk/debug/app-debug.apk
