name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup environment
        run: |
          npm install @capacitor/core @capacitor/android @capacitor/cli
          mkdir -p www
          # Copying your web files and the start script into the build
          cp index.html style.css start.lua www/ 2>/dev/null || true

      - name: create android project
        run: |
          # Fresh generate since we are not storing the 'android' folder in git
          npx cap add android
          npx cap sync android

      - name: patch mainactivity
        run: |
          # This finds the auto-generated file and injects the bridge
          FILE_PATH=$(find android/app/src/main/java -name "MainActivity.java")
          PACKAGE_LINE=$(grep "package" $FILE_PATH)
          
          cat <<EOF > $FILE_PATH
          $PACKAGE_LINE
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.JavascriptInterface;
          import android.content.Intent;
          import android.net.Uri;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = this.getBridge().getWebView();
                  webView.addJavascriptInterface(new Object() {
                      @JavascriptInterface
                      public void launch(String script) {
                          Intent i = new Intent(Intent.ACTION_VIEW);
                          
                          // THE LAUNCH STRING
                          // +userId:0 and +username:Player makes it load as a guest noob
                          // +placeid:1818 is a dummy ID to trigger the 'Play' mode
                          String uri = "robloxmobile://+launchmode:play+gameinfo:1+placeid:1818+launchticket:1+userId:0+username:Player+scripturl:" + script;
                          
                          i.setData(Uri.parse(uri));
                          i.setPackage("com.roblox.client"); 
                          i.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                          
                          try {
                              startActivity(i);
                          } catch (Exception e) {
                              i.setPackage(null);
                              startActivity(i);
                          }
                      }
                  }, "RestraintBridge");
              }
          }
          EOF

      - name: inject icons and splash
        run: |
          # This forces your resources/icon.png into all the Android icon slots
          if [ -d "resources" ]; then
            find android/app/src/main/res/ -name "ic_launcher.png" -exec cp resources/icon.png {} \;
            find android/app/src/main/res/ -name "ic_launcher_round.png" -exec cp resources/icon.png {} \;
            find android/app/src/main/res/ -name "ic_launcher_foreground.png" -exec cp resources/icon.png {} \;
            
            # Remove adaptive XML so it uses your actual PNG
            rm -rf android/app/src/main/res/mipmap-anydpi-v26 2>/dev/null || true
          fi

      - name: build apk
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: Restraint-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
