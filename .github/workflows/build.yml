name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: install dependencies
        run: |
          npm install @capacitor/core @capacitor/android @capacitor/cli
          mkdir -p www
          cp index.html style.css start.lua www/ 2>/dev/null || true

      - name: initialize capacitor
        run: |
          npx cap add android
          npx cap sync android

      - name: patch mainactivity (Solo Local Host)
        run: |
          FILE_PATH=$(find android/app/src/main/java -name "MainActivity.java")
          PACKAGE_LINE=$(grep "package" $FILE_PATH)
          
          cat <<EOF > $FILE_PATH
          $PACKAGE_LINE
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.JavascriptInterface;
          import android.content.Intent;
          import android.net.Uri;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  WebView webView = this.getBridge().getWebView();
                  webView.addJavascriptInterface(new Object() {
                      @JavascriptInterface
                      public void launch(String script) {
                          Intent i = new Intent(Intent.ACTION_VIEW);
                          
                          // +launchmode:play + userId:0 + username:Player forces the noob look
                          // We use placeLauncherUrl to point to your local server script
                          String uri = "robloxmobile://+launchmode:play+gameinfo:1+placeid:1818+userId:0+username:Player+placeLauncherUrl:" + script;
                          
                          i.setData(Uri.parse(uri));
                          i.setPackage("com.roblox.client"); 
                          i.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                          
                          try {
                              startActivity(i);
                          } catch (Exception e) {
                              i.setPackage(null);
                              startActivity(i);
                          }
                      }
                  }, "RestraintBridge");
              }
          }
          EOF

      - name: force custom icons
        run: |
          if [ -f "resources/icon.png" ]; then
            find android/app/src/main/res/ -name "ic_launcher.png" -exec cp resources/icon.png {} \;
            find android/app/src/main/res/ -name "ic_launcher_round.png" -exec cp resources/icon.png {} \;
            find android/app/src/main/res/ -name "ic_launcher_foreground.png" -exec cp resources/icon.png {} \;
            rm -rf android/app/src/main/res/mipmap-anydpi-v26 2>/dev/null || true
          fi

      - name: build apk
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Restraint-Solo-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
